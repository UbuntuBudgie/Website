media:
  input: public
  output: /

content:
  - name: blog
    label: Blog
    path: src/content/blog
    type: collection
    filename: "{slug}" 
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: description
        type: string
        label: Description
        required: true
      - name: pubDate
        type: date
        label: Publication Date
        required: true
      - name: author
        type: string
        label: Author
        required: true
      - name: image
        type: image
        label: Featured Image
      - name: category 
        type: string
        label: Category
      - name: tags
        type: string
        label: Tags
        list: true
      - name: draft
        type: boolean
        label: Draft
        default: false
      - name: body
        type: rich-text
        label: Content
        

  - name: gallery
    label: Gallery
    path: src/content/gallery
    type: collection
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: description
        type: string
        label: Description
      - name: image
        type: image
        label: Image
        required: true
      - name: category
        type: string
        label: Category
      - name: date
        type: date
        label: Date
        required: true

  - name: authors
    label: Authors
    path: src/content/authors
    type: collection
    fields:
      - name: name
        type: string
        label: Name
        required: true
      - name: image
        type: image
        label: Featured Image
        path: public/team

  - name: team
    label: Team
    path: src/content/team
    type: collection
    fields:
      - name: name
        type: string
        label: Name
        required: true
      - name: role
        type: string
        label: Role
        required: true
      - name: bio
        type: text
        label: Biography
      - name: avatar
        type: image
        label: Avatar
      - name: email
        type: string
        label: Email
      - name: social
        type: object
        label: Social Links
        fields:
          - name: twitter
            type: string
            label: Twitter
          - name: github
            type: string
            label: GitHub
          - name: linkedin
            type: string
            label: LinkedIn

  - name: downloads
    label: Download Releases
    path: src/content/downloads
    type: collection
    fields:
    - name: version
      type: string
      label: Version Number
      required: true
    - name: releaseType
      type: string
      label: Release Type
      required: true
    - name: supportPeriod
      type: string
      label: Support Period
    - name: description
      type: text
      label: Description
    - name: downloadUrl
      type: string
      label: Download URL
    - name: torrentUrl
      type: string
      label: Torrent URL
    - name: readmeUrl
      type: string
      label: Readme URL
    - name: usbBuyUrl
      type: string
      label: USB Buy URL (optional)
    - name: checksum
      type: string
      label: SHA256 Checksum
    - name: order
      type: number
      label: Display Order

  - name: downloads-settings
    label: Downloads Page Settings
    path: src/content/downloads-settings/downloads-settings.json
    type: file
    fields:
    - name: donationTitle
      type: string
      label: Donation Section Title
    - name: donationDescription
      type: text
      label: Donation Description
    - name: tip1Label
      type: string
      label: Tip Button 1 Label
    - name: tip1Url
      type: string
      label: Tip Button 1 URL
    - name: tip2Label
      type: string
      label: Tip Button 2 Label
    - name: tip2Url
      type: string
      label: Tip Button 2 URL
    - name: tip3Label
      type: string
      label: Tip Button 3 Label
    - name: tip3Url
      type: string
      label: Tip Button 3 URL
    - name: tip4Label
      type: string
      label: Tip Button 4 Label
    - name: tip4Url
      type: string
      label: Tip Button 4 URL
    - name: usbDescription
      type: text
      label: USB Section Description
    - name: usbButtonText
      type: string
      label: USB Button Text
    - name: usbButtonUrl
      type: string
      label: USB Button URL
    - name: installationTitle
      type: string
      label: Accordion Title
    - name: installationContent
      type: rich-text
      label: Installation Instructions